<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Netflix - Escolha seu perfil para começar a assistir seus filmes e séries favoritos">
    <meta name="keywords" content="Netflix, streaming, filmes, séries, perfil">
    <meta name="theme-color" content="#e50914">
    
    <title>Netflix - Seleção de Perfil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle" aria-label="Ativar modo claro">
        <span>☀️</span>
    </button>
    
    <a href="#main-content" class="skip-link">Ir para conteúdo principal</a>
    
    <main id="main-content">
        <header role="banner">
            <h1>Quem está assistindo?</h1>
            <p>Selecione o perfil para continuar assistindo na Netflix</p>
        </header>
        
        <section class="profiles" aria-label="Lista de perfis disponíveis" role="region">
            <a href="catalogo/catalogo.html" class="profile" aria-label="Selecionar Perfil 1" onclick="selectProfile('Jake', 'https://i.pinimg.com/originals/30/99/e3/3099e361dca53cbf677b244b290b1c0e.jpg')">
                <figure>
                    <img class="profile-image"
                        src="https://i.pinimg.com/originals/30/99/e3/3099e361dca53cbf677b244b290b1c0e.jpg" 
                        alt="Um personagem masculino em estilo stop-motion, vestindo um casaco de retalhos e segurando um monóculo, posa em frente a um cenário gótico em miniatura iluminado por velas."
                        loading="lazy"
                        decoding="async">
                    <figcaption>Jake</figcaption>
                </figure>
            </a>
            
            <a href="catalogo/catalogo.html" class="profile" aria-label="Selecionar Perfil 2" onclick="selectProfile('Kayky', 'https://i.pinimg.com/736x/c9/a4/50/c9a450f1f7d8f5aefa9b3065f22a4909.jpg')">
                <figure>
                    <img class="profile-image"
                        src="https://i.pinimg.com/736x/c9/a4/50/c9a450f1f7d8f5aefa9b3065f22a4909.jpg" 
                        alt="Imagem de um boné azul"
                        loading="lazy"
                        decoding="async">
                    <figcaption>Kayky</figcaption>
                </figure>
            </a>
            
            <a href="catalogo/catalogo.html" class="profile" aria-label="Selecionar Perfil 3" onclick="selectProfile('Lucas', 'https://i.pinimg.com/736x/fd/94/89/fd9489fe3818a1b020fbf8cc475e267f.jpg')">
                <figure>
                    <img class="profile-image"
                        src="https://i.pinimg.com/736x/fd/94/89/fd9489fe3818a1b020fbf8cc475e267f.jpg" 
                        alt="Imagem do Perfil 3"
                        loading="lazy"
                        decoding="async">
                    <figcaption>Lucas</figcaption>
                </figure>
            </a>
            
            <a href="catalogo/catalogo.html" class="profile" aria-label="Selecionar Perfil 4" onclick="selectProfile('José', 'https://images.gamebanana.com/img/ss/concepts/65dc33b363110.jpg')">
                <figure>
                    <img class="profile-image"
                        src="https://images.gamebanana.com/img/ss/concepts/65dc33b363110.jpg" 
                        alt="Imagem do Perfil 4"
                        loading="lazy"
                        decoding="async">
                    <figcaption>José</figcaption>
                </figure>
            </a>
        </section>
        
        <div class="profile-actions">
            <button class="manage-profiles-btn" aria-label="Gerenciar perfis">
                Gerenciar perfis
            </button>
        </div>
    </main>
    
    <footer role="contentinfo">
        <small>&copy; 2026 Netflix Clone. Projeto educacional.</small>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
